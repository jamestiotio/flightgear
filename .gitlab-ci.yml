variables:
  BUILD_DIR: "$CI_PROJECT_DIR/build"
  PREFIX_DIR: "$CI_PROJECT_DIR/dist"
  OSG_REF: fgfs-osg-36-2
  BRANCH_REF: next

  # create a root dir *above* the Simgear checkout, otherwise CMake
  # complains about INTERFACE_INCLUDE_DIRECTORIES being the source dir
  WIN_FG_DIR: $CI_BUILDS_DIR\flightgear

  MAC_IMAGE: macos-14-xcode-15

linux-build:
  image: registry.gitlab.com/flightgear/flightgear
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE != "schedule"
  script:
    - cmake -B $BUILD_DIR -S $CI_PROJECT_DIR -G Ninja 
      -D CMAKE_BUILD_TYPE=RelWithDebInfo 
      -D CMAKE_INSTALL_PREFIX=$PREFIX_DIR
      -D CMAKE_PREFIX_PATH=$CI_PROJECT_DIR/simgear-dist;$CI_PROJECT_DIR/osg-dist
    - cmake --build $BUILD_DIR
    - cmake --build $BUILD_DIR --target install
    # running here because otherwise we would need to cache/save the whole build tree
    # maybe can be improved with cache kesy shared between the jobs?
    - ctest --test-dir $BUILD_DIR 
  artifacts:
    paths:
      - dist
  needs:
    - project: flightgear/simgear
      job: linux-build
      artifacts: true
      ref: $BRANCH_REF
    - project: flightgear/openscenegraph
      job: linux-build
      ref: $OSG_REF
      artifacts: true
  cache:
    paths:
      - $BUILD_DIR

windows-build:
  stage: build
  tags:
    - saas-windows-medium-amd64
  before_script:
    - C:\"Program Files (x86)\Microsoft Visual Studio"\2022\BuildTools\Common7\Tools\Launch-VsDevShell -SkipAutomaticLocation -Arch amd64
  # relocate our upstream deps outside the source dir, otherwise
  # CMake gets sad.
    - Move-Item -Path $CI_PROJECT_DIR\boost $WIN_FG_DIR\boost
    - Move-Item -Path $CI_PROJECT_DIR\msvc140 $WIN_FG_DIR\msvc140
    # - ls $env:CI_PROJECT_DIR

  script:
    # should ideally be done inside CMake but this works for now
    # 
    - $Env:PATH += ";$WIN_FG_DIR\msvc140\3rdparty.x64\bin"

    - cmake -B $env:BUILD_DIR -S $env:CI_PROJECT_DIR -G Ninja 
      -D CMAKE_BUILD_TYPE=RelWithDebInfo
      -D CMAKE_INSTALL_PREFIX=$env:PREFIX_DIR
      -D MSVC_3RDPARTY_ROOT=$WIN_FG_DIR
      -D OSG_FSTREAM_EXPORT_FIXED:BOOL=ON
      -D CMAKE_PREFIX_PATH="$env:CI_PROJECT_DIR\simgear-dist;$env:CI_PROJECT_DIR\osg-dist"

    - cmake --build $BUILD_DIR
    - cmake --build $BUILD_DIR --target install
  needs:
    - project: flightgear/simgear
      job: windows-build
      ref: $BRANCH_REF
      artifacts: true
    - project: flightgear/openscenegraph
      job: windows_build
      ref: $OSG_REF
      artifacts: true
    - project: flightgear/windows-3rd-party
      job: windows_build_msvc140
      ref: master
      artifacts: true
  artifacts:
    paths:
      - dist

macos-build:
  stage: build
  tags:
    - saas-macos-medium-m1
  image: $MAC_IMAGE
  rules:
    - if: $CI_PIPELINE_SOURCE != "schedule"
  before_script:
      - export HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1
      - export HOMEBREW_NO_INSTALL_CLEANUP=1
      - brew install ninja cmake boost
  script:
    # ensure we use our FreeType and not the one from Homebrew
    # ours is UB, HomeBrew's is not
    - export FREETYPE_DIR=$CI_PROJECT_DIR/dist
    - ls $CI_PROJECT_DIR/simgear-dist/lib
    - cmake -B $BUILD_DIR -S $CI_PROJECT_DIR -G Ninja 
      --debug-find-pkg=SimGear
      -D CMAKE_BUILD_TYPE=RelWithDebInfo 
      -D CMAKE_INSTALL_PREFIX=$PREFIX_DIR
      -D CMAKE_OSX_ARCHITECTURES=arm64
      -D CMAKE_PREFIX_PATH="$CI_PROJECT_DIR/osg-dist;$CI_PROJECT_DIR/simgear-dist"
      
    - cmake --build $BUILD_DIR
    - cmake --build $BUILD_DIR --target install
  needs:
    - project: flightgear/simgear
      job: macos-build
      ref: $BRANCH_REF
      artifacts: true
    - project: flightgear/openscenegraph
      job: macos-build
      ref: $OSG_REF
      artifacts: true
    - project: flightgear/macos-3rd-party
      job: macos-build
      ref: main
      artifacts: true
  artifacts:
    paths:
      - dist
  cache:
    paths:
      - $BUILD_DIR

macos-x64-build:
  stage: build
  tags:
    - saas-macos-medium-m1
  image: $MAC_IMAGE
  rules:
    - if: $CI_PIPELINE_SOURCE != "schedule"
  before_script:
      - export HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1
      - export HOMEBREW_NO_INSTALL_CLEANUP=1
      - brew install ninja cmake boost
  script:
    # ensure we use our FreeType and not the one from Homebrew
    # ours is UB, HomeBrew's is not
    - export FREETYPE_DIR=$CI_PROJECT_DIR/dist
    - cmake -B $BUILD_DIR -S $CI_PROJECT_DIR -G Ninja 
      -D CMAKE_BUILD_TYPE=RelWithDebInfo 
      -D CMAKE_INSTALL_PREFIX=$PREFIX_DIR
      -D CMAKE_OSX_ARCHITECTURES=x86_64
      -D CMAKE_PREFIX_PATH="$CI_PROJECT_DIR/osg-dist;$CI_PROJECT_DIR/simgear-dist"

    - cmake --build $BUILD_DIR
    - cmake --build $BUILD_DIR --target install
  needs:
    - project: flightgear/simgear
      job: macos-x64-build
      ref: $BRANCH_REF
      artifacts: true
    - project: flightgear/openscenegraph
      job: macos-build
      ref: $OSG_REF
      artifacts: true
    - project: flightgear/macos-3rd-party
      job: macos-build
      ref: main
      artifacts: true
  artifacts:
    paths:
      - dist
  cache:
    paths:
      - $BUILD_DIR

